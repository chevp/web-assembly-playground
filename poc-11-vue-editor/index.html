<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>poc-11 — Vue + Monaco scene editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FontAwesome 6 (free) for tab icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    referrerpolicy="no-referrer"
  />

  <!-- App styles -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Vue mounts here -->
  <div id="root"></div>

  <!--
    Load order matters:
      1. Monaco AMD loader (defines global `require` for AMD)
      2. Vue 3 global build (defines global `Vue`)
      3. Our app as an ES module — imports engine.js + projection.js
  -->
  <script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
