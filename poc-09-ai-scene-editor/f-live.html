<!doctype html>
<meta charset="utf-8" />
<title>poc-09 / F — Chat-driven, live engine</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #161616;
    --deep: #0e1116;
    --chrome: #141821;
    --border: #2a2a2a;
    --border-soft: #1f1f1f;
    --text: #ddd;
    --dim: #889;
    --mute: #556;
    --teal: #4ecdc4;
    --yellow: #ffe66d;
    --red: #ff6b6b;
    --purple: #a78bfa;
    --green: #6ee07a;
    --coral: #ff8c66;
  }

  * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: #2a2f3a transparent; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 4px; }
  *::-webkit-scrollbar-track { background: transparent; }

  html, body {
    margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
  }
  #app { display: grid; grid-template-columns: 420px 1fr; height: 100vh; }

  /* ---------- LEFT: chat ---------- */
  #chat { display: flex; flex-direction: column; min-width: 0; border-right: 1px solid var(--border); background: var(--panel); }

  .chat-head {
    padding: 14px 18px; border-bottom: 1px solid var(--border-soft);
    color: var(--dim); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .chat-head b { color: var(--coral); font-weight: 500; }
  .chat-head .live { color: var(--green); margin-left: 8px; }
  .chat-head .live::before { content: "● "; }

  #thread { flex: 1; overflow: auto; padding: 18px 18px 24px; min-height: 0; }
  .msg { margin-bottom: 22px; line-height: 1.6; }
  .msg .who {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--mute); margin-bottom: 6px;
  }
  .msg.you .who { color: var(--dim); }
  .msg.ai  .who { color: var(--coral); }
  .msg .body { color: var(--text); font-size: 12px; }
  .msg .body .ref { color: var(--teal); }
  .msg .body .tag {
    color: var(--coral); background: #2a1a14; border: 1px solid #4a261c;
    padding: 0 5px; border-radius: 2px; font-size: 10px;
  }

  /* Thinking pulse */
  .msg.thinking .body {
    color: var(--mute); font-style: italic;
  }
  .msg.thinking .body::after {
    content: "•••"; margin-left: 4px; letter-spacing: 2px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 1.0; }
  }

  /* Suggested chips under the latest AI turn */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .chip {
    background: transparent; color: var(--text); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 16px; font: inherit; font-size: 11px;
    cursor: pointer; text-align: left;
  }
  .chip:hover { border-color: var(--coral); color: var(--coral); }
  .chip:disabled { opacity: 0.4; cursor: default; }

  #composer {
    padding: 12px; border-top: 1px solid var(--border-soft); background: var(--deep);
  }
  #composer .box {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px;
  }
  #composer textarea {
    flex: 1; resize: none; min-height: 22px; max-height: 120px;
    background: transparent; color: var(--text); border: 0; outline: none;
    font: inherit; font-size: 12px; line-height: 1.5;
  }
  #composer textarea::placeholder { color: var(--mute); }
  #composer button {
    background: var(--coral); color: var(--bg); border: 0;
    padding: 6px 12px; border-radius: 3px; font: inherit; font-weight: 600; font-size: 11px;
    cursor: pointer;
  }
  #composer button:hover { background: #ffa985; }
  #composer button:disabled { background: #5a3a30; color: #998; cursor: wait; }
  #composer .hint {
    margin-top: 6px; color: var(--mute); font-size: 10px; padding: 0 2px;
  }

  /* ---------- RIGHT: live preview + collapsible source ---------- */
  #right { display: flex; flex-direction: column; min-width: 0; min-height: 0; }

  .preview-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: var(--chrome); border-bottom: 1px solid var(--border);
    color: var(--dim); font-size: 11px;
  }
  .preview-bar .left { display: flex; align-items: center; gap: 12px; }
  .preview-bar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mute); }
  .preview-bar .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .preview-bar .title { color: var(--text); }
  .preview-bar .meta { color: var(--mute); }
  .preview-bar .right { color: var(--mute); font-size: 10px; }

  #stage {
    flex: 1; min-height: 0; position: relative; overflow: hidden;
    background: #0e1116;
    display: grid; place-items: center;
  }
  #canvas {
    display: block;
    background: #0e1116;
    border: 1px solid var(--border);
    max-width: 100%;
    max-height: 100%;
  }
  #boot-overlay {
    position: absolute; inset: 0; display: grid; place-items: center;
    color: var(--dim); font-size: 12px; background: rgba(14,17,22,0.85);
    pointer-events: none;
  }
  #boot-overlay.gone { display: none; }
  #boot-overlay .spin {
    display: inline-block; width: 14px; height: 14px; margin-right: 8px;
    border: 2px solid var(--mute); border-top-color: var(--coral);
    border-radius: 50%; vertical-align: middle;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Source drawer (collapsed by default) — live projection of engine state */
  #drawer {
    border-top: 1px solid var(--border); background: var(--deep);
    display: flex; flex-direction: column; min-height: 0;
  }
  #drawer .head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; cursor: pointer; user-select: none;
    color: var(--dim); font-size: 11px;
  }
  #drawer .head:hover { color: var(--text); }
  #drawer .head .left { display: flex; align-items: center; gap: 8px; }
  #drawer .head .chev { display: inline-block; transition: transform 120ms ease; color: var(--mute); }
  #drawer .head .fmt { color: var(--teal); }
  #drawer .head .badge {
    background: #2a1a14; color: var(--coral); border: 1px solid #4a261c;
    padding: 1px 6px; border-radius: 2px; font-size: 10px;
  }
  #drawer .head .ver { color: var(--mute); font-size: 10px; }
  #drawer.open .head .chev { transform: rotate(90deg); }
  #drawer .body { max-height: 0; overflow: hidden; transition: max-height 200ms ease; }
  #drawer.open .body { max-height: 36vh; overflow: auto; }
  #drawer pre {
    margin: 0; padding: 12px 16px 18px;
    font-size: 11px; line-height: 1.55; color: var(--text);
    white-space: pre; tab-size: 2;
  }
</style>

<div id="app">

  <!-- LEFT: chat thread -->
  <div id="chat">
    <div class="chat-head">
      poc-09 / <b>F</b> &mdash; chat &rarr; live engine
      <span class="live" id="live-flag" style="display:none">running</span>
    </div>

    <div id="thread"></div>

    <div id="composer">
      <div class="box">
        <textarea id="prompt" rows="1" placeholder="booting engine…" disabled></textarea>
        <button id="send" type="button" disabled>send</button>
      </div>
      <div class="hint">
        canned demo &middot; suggested chips fire real engine calls
      </div>
    </div>
  </div>

  <!-- RIGHT: live preview -->
  <div id="right">
    <div class="preview-bar">
      <div class="left">
        <span class="dot" id="status-dot"></span>
        <span class="title">scene:orbital</span>
        <span class="meta" id="status-meta">booting…</span>
      </div>
      <div class="right" id="mw-version"></div>
    </div>

    <div id="stage">
      <canvas id="canvas" width="800" height="600"></canvas>
      <div id="boot-overlay"><span class="spin"></span>loading Cryolite (wasm + three.js)…</div>
    </div>

    <div id="drawer">
      <div class="head" id="drawer-head">
        <div class="left">
          <span class="chev">&rsaquo;</span>
          <span>show source</span>
          <span class="fmt">graph-json/v1</span>
          <span class="badge">live projection</span>
        </div>
        <span class="ver" id="drawer-ver">version 1</span>
      </div>
      <div class="body"><pre id="drawer-src">{}</pre></div>
    </div>
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "three":           "https://unpkg.com/three@0.165.0/build/three.module.js",
    "@chevp/cryolite": "../poc-07-cryolite/lib/index.js"
  }
}
</script>

<script type="module">
  import * as THREE from "three";
  import { FrostEngine, FrostRenderer } from "@chevp/cryolite";

  // ---------- DOM ----------
  const threadEl   = document.getElementById("thread");
  const promptEl   = document.getElementById("prompt");
  const sendEl     = document.getElementById("send");
  const liveFlagEl = document.getElementById("live-flag");
  const statusDot  = document.getElementById("status-dot");
  const statusMeta = document.getElementById("status-meta");
  const mwVerEl    = document.getElementById("mw-version");
  const overlay    = document.getElementById("boot-overlay");
  const drawerEl   = document.getElementById("drawer");
  const drawerHead = document.getElementById("drawer-head");
  const drawerSrc  = document.getElementById("drawer-src");
  const drawerVer  = document.getElementById("drawer-ver");

  drawerHead.addEventListener("click", () => {
    drawerEl.classList.toggle("open");
    if (drawerEl.classList.contains("open")) renderDrawer();
  });

  // ---------- Chat plumbing ----------
  function appendMsg(who, html, extraCls = "") {
    const wrap = document.createElement("div");
    wrap.className = `msg ${who} ${extraCls}`.trim();
    wrap.innerHTML = `<div class="who">${who === "you" ? "you" : "assistant"}</div><div class="body">${html}</div>`;
    threadEl.appendChild(wrap);
    threadEl.scrollTop = threadEl.scrollHeight;
    return wrap;
  }
  function appendChips(items, onClick) {
    const row = document.createElement("div");
    row.className = "chips";
    for (const it of items) {
      const b = document.createElement("button");
      b.className = "chip";
      b.textContent = it.prompt;
      b.onclick = () => onClick(it, row);
      row.appendChild(b);
    }
    threadEl.appendChild(row);
    threadEl.scrollTop = threadEl.scrollHeight;
    return row;
  }

  // ---------- Live "graph" mirror ----------
  // Mirror what we tell the engine so we can render a graph-json/v1
  // projection in the drawer. This *is* the graph — the engine and the
  // renderer are read-side views (ADR-034).
  const graph = {
    version: 1,
    nodes: [
      { id: "scene:orbital", type: "scene",  components: { name: "Orbital Demo (live)" } },
      { id: "script:orbit",  type: "script", components: { language: "lua" } },
    ],
    edges: [],
  };
  function addNode(node) { graph.nodes.push(node); graph.version++; refreshStatus(); maybeRenderDrawer(); }
  function addEdge(edge) { graph.edges.push(edge); graph.version++; refreshStatus(); maybeRenderDrawer(); }
  function updateNode(id, patch) {
    const n = graph.nodes.find((x) => x.id === id);
    if (n) n.components = { ...n.components, ...patch };
    graph.version++; refreshStatus(); maybeRenderDrawer();
  }
  function maybeRenderDrawer() { if (drawerEl.classList.contains("open")) renderDrawer(); }
  function renderDrawer() {
    drawerSrc.textContent = JSON.stringify(graph, null, 2);
    drawerVer.textContent = `version ${graph.version}`;
  }
  function refreshStatus() {
    statusMeta.textContent = `${graph.nodes.length} nodes · ${graph.edges.length} edges · version ${graph.version}`;
    drawerVer.textContent = `version ${graph.version}`;
  }

  // ---------- Boot engine + renderer ----------
  const canvas = document.getElementById("canvas");
  let engine, renderer;
  try {
    engine   = await FrostEngine.create({ print: (s) => console.log("[engine]", s) });
    renderer = new FrostRenderer(canvas, { width: 800, height: 600 });
  } catch (err) {
    overlay.innerHTML = `<span style="color:var(--red)">engine boot failed: ${String(err.message || err)}</span>`;
    appendMsg("ai", `Could not boot the engine: <code>${String(err.message || err)}</code>. The other variants (B/C/D/E) are static mocks and don't need wasm.`);
    throw err;
  }

  // Static lights (renderer-only — not part of the editable graph for this POC)
  renderer.scene.add(new THREE.AmbientLight(0x3a3a4a, 0.6));
  const dir = new THREE.DirectionalLight(0xfff8e0, 1.2);
  dir.position.set(5, 10, 5);
  renderer.scene.add(dir);

  // Helper: spawn a mesh into the renderer (the renderer's build() is one-shot
  // over a parsed scene — for chat-driven additive editing we register meshes
  // by hand. Same shape as renderer._buildComponent("mesh", ...).)
  function spawnMesh(id, color, radius = 0.5) {
    const geom = new THREE.SphereGeometry(radius, 24, 16);
    const mat  = new THREE.MeshStandardMaterial({ color: new THREE.Color(color), roughness: 0.4, metalness: 0.1 });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.userData.entityId = id;
    renderer.scene.add(mesh);
    renderer.objects.set(id, { object3d: mesh });
  }

  // Initial scene: just the sun, ticking but stationary
  engine.addEntity("entity:sun");
  engine.setPosition("entity:sun", 0, 0, 0);
  engine.setScale("entity:sun", 1.0, 1.0, 1.0);
  engine.setColor("entity:sun", "#ffe66d");
  spawnMesh("entity:sun", "#ffe66d", 0.7);
  addNode({
    id: "entity:sun", type: "entity",
    components: {
      transform: { position: [0,0,0], scale: [1,1,1] },
      mesh: { shape: "sphere", color: "#ffe66d" },
    },
  });
  addEdge({ from: "scene:orbital", to: "entity:sun", kind: "contains" });

  // Render loop
  let last = performance.now();
  function loop(now) {
    const dt = Math.min((now - last) / 1000, 0.1);
    last = now;
    engine.tick(dt);
    renderer.sync(engine);
    renderer.render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // Boot complete — hand control to chat
  overlay.classList.add("gone");
  liveFlagEl.style.display = "inline";
  statusDot.classList.add("live");
  mwVerEl.textContent = `nuna-middleware ${engine.middlewareVersion}`;
  refreshStatus();
  promptEl.disabled = false;
  sendEl.disabled = false;
  promptEl.placeholder = "describe a change…";

  // ---------- Canned conversation that fires real engine calls ----------
  const orbitLua = (r, sp) => `
local id = frost.self.id
local r  = ${r}
local sp = ${sp}
function onUpdate(dt)
  local t = frost.getTime() * sp
  frost.setPosition(id, math.cos(t)*r, 0, math.sin(t)*r)
end`;

  // Each step: a chip the user can click. apply() mutates the live engine
  // AND the graph mirror, in lockstep. The reply text talks about the
  // change in graph terms — never file terms.
  const steps = [
    {
      prompt: "add a red planet at radius 3",
      reply:  "Added <span class=\"ref\">entity:planet-red</span> at radius 3, attached <span class=\"ref\">script:orbit</span> with <span class=\"tag\">speed 1.0</span>. Watch the right pane — it's a real engine tick, not a CSS animation.",
      apply() {
        const id = "entity:planet-red";
        engine.addEntity(id);
        engine.setPosition(id, 3, 0, 0);
        engine.setScale(id, 0.5, 0.5, 0.5);
        engine.setColor(id, "#ff6b6b");
        engine.attachScript(id, orbitLua(3.0, 1.0));
        spawnMesh(id, "#ff6b6b", 0.5);
        addNode({ id, type: "entity", components: {
          transform: { position: [3,0,0], scale: [0.5,0.5,0.5] },
          mesh: { shape: "sphere", color: "#ff6b6b" },
          scriptProps: { radius: 3.0, speed: 1.0 },
        }});
        addEdge({ from: "scene:orbital", to: id, kind: "contains" });
        addEdge({ from: id, to: "script:orbit", kind: "runs" });
      },
    },
    {
      prompt: "add a teal one further out, twice as fast",
      reply:  "Added <span class=\"ref\">entity:planet-teal</span> at radius 4.5 with <span class=\"tag\">speed 2.0</span>. Same <span class=\"ref\">script:orbit</span> — different scriptProps, no duplication.",
      apply() {
        const id = "entity:planet-teal";
        engine.addEntity(id);
        engine.setPosition(id, 4.5, 0, 0);
        engine.setScale(id, 0.4, 0.4, 0.4);
        engine.setColor(id, "#4ecdc4");
        engine.attachScript(id, orbitLua(4.5, 2.0));
        spawnMesh(id, "#4ecdc4", 0.4);
        addNode({ id, type: "entity", components: {
          transform: { position: [4.5,0,0], scale: [0.4,0.4,0.4] },
          mesh: { shape: "sphere", color: "#4ecdc4" },
          scriptProps: { radius: 4.5, speed: 2.0 },
        }});
        addEdge({ from: "scene:orbital", to: id, kind: "contains" });
        addEdge({ from: id, to: "script:orbit", kind: "runs" });
      },
    },
    {
      prompt: "add a slow purple one far out",
      reply:  "Added <span class=\"ref\">entity:planet-purple</span> at radius 7 with <span class=\"tag\">speed 0.4</span>. Three planets, one script — the share-by-edge wins.",
      apply() {
        const id = "entity:planet-purple";
        engine.addEntity(id);
        engine.setPosition(id, 7, 0, 0);
        engine.setScale(id, 0.6, 0.6, 0.6);
        engine.setColor(id, "#a78bfa");
        engine.attachScript(id, orbitLua(7.0, 0.4));
        spawnMesh(id, "#a78bfa", 0.6);
        addNode({ id, type: "entity", components: {
          transform: { position: [7,0,0], scale: [0.6,0.6,0.6] },
          mesh: { shape: "sphere", color: "#a78bfa" },
          scriptProps: { radius: 7.0, speed: 0.4 },
        }});
        addEdge({ from: "scene:orbital", to: id, kind: "contains" });
        addEdge({ from: id, to: "script:orbit", kind: "runs" });
      },
    },
    {
      prompt: "make the red one bigger",
      reply:  "Bumped <span class=\"ref\">entity:planet-red</span> scale to <span class=\"tag\">0.9</span>. Same node, transform component patched — no file rewrite.",
      apply() {
        engine.setScale("entity:planet-red", 0.9, 0.9, 0.9);
        updateNode("entity:planet-red", {
          transform: { position: [3,0,0], scale: [0.9,0.9,0.9] },
        });
      },
    },
  ];

  // ---------- Step controller ----------
  let stepIdx = 0;
  let pendingChips = null;

  function showCurrentChips() {
    if (pendingChips) { pendingChips.remove(); pendingChips = null; }
    if (stepIdx >= steps.length) {
      const done = document.createElement("div");
      done.className = "msg ai";
      done.innerHTML = `<div class="who">assistant</div><div class="body">That's the canned walk-through. The composer is a stub — wiring it to a real model + tool-calls is the next variant.</div>`;
      threadEl.appendChild(done);
      threadEl.scrollTop = threadEl.scrollHeight;
      promptEl.placeholder = "(canned demo finished)";
      promptEl.disabled = true;
      sendEl.disabled = true;
      return;
    }
    pendingChips = appendChips([steps[stepIdx]], runStep);
  }

  function runStep(step) {
    if (pendingChips) { pendingChips.remove(); pendingChips = null; }
    appendMsg("you", step.prompt);
    const thinking = appendMsg("ai", "applying", "thinking");
    setTimeout(() => {
      try { step.apply(); }
      catch (err) {
        thinking.remove();
        appendMsg("ai", `engine call failed: <code>${String(err.message || err)}</code>`);
        return;
      }
      thinking.remove();
      appendMsg("ai", step.reply);
      stepIdx++;
      showCurrentChips();
    }, 500);
  }

  // Greeting + first chip
  appendMsg(
    "ai",
    `Cryolite is up. Empty orbital scene with a sun (<span class="ref">entity:sun</span>). The right pane is a real <code>FrostEngine</code> tick + <code>FrostRenderer</code> sync — no static animation. Pick a prompt:`,
  );
  showCurrentChips();

  // Composer is a stub for now — clicking send echoes the typed text
  // and points at the chip flow. Wiring this to a real model call is
  // the obvious next step.
  sendEl.addEventListener("click", () => {
    const txt = promptEl.value.trim();
    if (!txt) return;
    appendMsg("you", txt);
    appendMsg("ai", "(free-text isn't wired to a model in this POC — use the suggested chip to drive an engine call)");
    promptEl.value = "";
  });
  promptEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendEl.click();
    }
  });
</script>
