<!doctype html>
<meta charset="utf-8" />
<title>cryolite — browser example</title>
<style>
  body { margin: 0; background: #1a1a1a; color: #ddd; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  #wrap { display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
  h1 { font-size: 14px; font-weight: 500; color: #aaa; margin: 0; }
  #canvas { display: block; width: 800px; height: 600px; background: #0e1116; border: 1px solid #333; }
  #hud { width: 800px; font-size: 12px; color: #889; }
</style>
<div id="wrap">
  <h1>cryolite &mdash; FrostEngine + FrostEngineViewer (three.js)</h1>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div id="hud">loading…</div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
    "@chevp/cryolite": "../../lib/index.js"
  }
}
</script>
<script type="module">
  import * as THREE from "three";
  import { FrostEngine, FrostEngineViewer } from "@chevp/cryolite";

  const hud = document.getElementById("hud");

  const engine = await FrostEngine.create({
    runtimePath: "/assets/runtime.xml",
    print: (s) => console.log("[wasm]", s),
  });

  const viewer = new FrostEngineViewer({
    engine,
    three: THREE,
    canvas: document.getElementById("canvas"),
  });
  viewer.start();

  hud.textContent =
    `cryolite · ${engine.entityCount} entities · nuna-middleware ${engine.middlewareVersion}`;
</script>
