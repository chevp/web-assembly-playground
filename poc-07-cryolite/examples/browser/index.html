<!doctype html>
<meta charset="utf-8" />
<title>cryolite — browser example</title>
<style>
  body { margin: 0; background: #1a1a1a; color: #ddd; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  #wrap { display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
  h1 { font-size: 14px; font-weight: 500; color: #aaa; margin: 0; }
  #canvas { display: block; width: 800px; height: 600px; background: #0e1116; border: 1px solid #333; }
  #log { width: 800px; height: 160px; overflow: auto; background: #0e1116; border: 1px solid #333; padding: 8px; font-size: 12px; white-space: pre-wrap; margin: 0; }
  #hud { width: 800px; font-size: 12px; color: #889; }
</style>
<div id="wrap">
  <h1>cryolite &mdash; .cryo + synth-xml + Lua + three.js (npm-library form of poc-06)</h1>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div id="hud">loading…</div>
  <pre id="log"></pre>
</div>
<script type="importmap">
{
  "imports": {
    "three":          "https://unpkg.com/three@0.165.0/build/three.module.js",
    "@chevp/cryolite": "../../lib/index.js"
  }
}
</script>
<script type="module">
  import * as THREE from "three";
  import { Cryolite } from "@chevp/cryolite";

  const logEl = document.getElementById("log");
  const lines = [];
  const log = (s) => {
    lines.push(s);
    if (lines.length > 80) lines.shift();
    logEl.textContent = lines.join("\n");
    logEl.scrollTop = logEl.scrollHeight;
  };

  const h = await Cryolite.boot({
    cryoUrl: "../../lib/assets/project.cryo",
    canvas: document.getElementById("canvas"),
    three: THREE,
    log,
  });
  h.start();

  document.getElementById("hud").textContent =
    `cryolite · ${h.scene.entities.length} entities · nuna-middleware ${h.engine.middlewareVersion}`;
</script>
